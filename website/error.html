<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #0f172a;       /* slate-900 */
      --fg: #e5e7eb;       /* gray-200 */
      --muted: #94a3b8;    /* slate-400 */
      --accent: #38bdf8;   /* sky-400 */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont,
                   "Segoe UI", Roboto, Ubuntu, Cantarell, sans-serif;
      background: radial-gradient(circle at top, #020617, var(--bg));
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      max-width: 520px;
      padding: 2.5rem;
      text-align: center;
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 800;
      margin-bottom: 1rem;
      color: var(--accent);
    }

    h2 {
      font-size: 1.4rem;
      margin-bottom: 0.75rem;
    }

    p {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    a {
      display: inline-block;
      text-decoration: none;
      color: #020617;
      background: var(--accent);
      padding: 0.7rem 1.25rem;
      border-radius: 0.5rem;
      font-weight: 600;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    a:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 25px rgba(56, 189, 248, 0.35);
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Page not found</h2>
    <p>
      The page you’re looking for doesn’t exist or may have been moved.
      If you typed the URL manually, double-check the spelling.
    </p>

    <a href="/">Go back home</a>

    <footer>
      Served securely via CloudFront
    </footer>
  </div>
</body>
</html>
